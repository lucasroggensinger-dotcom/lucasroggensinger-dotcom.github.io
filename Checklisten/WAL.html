<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Meine Seite</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            display: flex;
            gap: 40px;
            margin-top: 20px;
        }
        .list-block {
            border: 1px solid #ccc;
            padding: 15px;
            width: 500px;
        }
        h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>

    <h1>Checkliste WAL "Under Construction"</h1>

    <div class="container">

        <!-- Linke Liste -->
        <div class="list-block">
            <h2>Checks before work approval</h2>

            <label><input type="checkbox" class="left"> Check if redundant radio site is OPS: No loopcheck alarms on radio switch, ISUP</label><br><br>
            <label><input type="checkbox" class="left"> Coord. with TWR</label><br><br>
            <label><input type="checkbox" class="left"> Coord. with ACC SPVR</label><br><br>
            <label><input type="checkbox" class="left"> Inform COM Center (VOLMET, ATIS ARR, GLIDERS)</label><br><br>
            <label><input type="checkbox" class="left"> Inform Swiss Dispatcher</label><br><br>
            <label><input type="checkbox" class="left"> Set LAG as active TX on 'VCS-RS1 21'</label><br><br>
            <label><input type="checkbox" class="left"> Set WAL to maintenance on 'VCS-RS1 21'</label><br><br>
            <label><input type="checkbox" class="left"> GO/NO GO Decision Given to ATSEP</label><br><br>

            <br>
            <button onclick="clearLeft()">Clear all</button>
        </div>

        <!-- Rechte Liste -->
        <div class="list-block">
            <h2>Checks after work done</h2>

            <label><input type="checkbox" class="right"> remove WAL from maintenance on 'VCS-RS1 21'</label><br><br>
            <label><input type="checkbox" class="right"> set WAL as active TX on even day. (VCS-RS1 21)</label><br><br>			
            <label><input type="checkbox" class="right"> Inform TWR SPVR</label><br><br>
            <label><input type="checkbox" class="right"> Inform ACC SPVR</label><br><br>
            <label><input type="checkbox" class="right"> Inform COM Center</label><br><br>
            <label><input type="checkbox" class="right"> Inform Swiss Dispatcher</label><br><br>
            <label><input type="checkbox" class="right"> Call ATSEP to go Home</label><br><br>

            <br>
            <button onclick="clearRight()">Clear all</button>
        </div>

    </div>

    <script>
        function clearLeft() {
            document.querySelectorAll('.left').forEach(cb => cb.checked = false);
        }

        function clearRight() {
            document.querySelectorAll('.right').forEach(cb => cb.checked = false);
        }
    </script>

</body>
</html>
